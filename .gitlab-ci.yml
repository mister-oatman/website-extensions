# Scrape follower counts
#
# GitLab CI/CD equivalent of .github/workflows/scrape.yml.

variables:
  # Keep the uv cache inside the project dir so GitLab can cache it between runs.
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"

stages:
  - scrape
  # Re-enable together with the pages job below (once the repo/pages are public).
  # - deploy

scrape:
  stage: scrape
  # Astral's uv image ships uv + Python 3.13, mirroring astral-sh/setup-uv.
  image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
  rules:
    # Schedule daily at 05:00 UTC = 07:00 Europe/Berlin (summer) / 06:00 (winter).
    # GitLab cron schedules are configured under CI/CD > Schedules, not in YAML.
    # The script itself decides on which days to actually scrape, pacing the
    # runs so the SerpApi search fallback stays within its billing-period
    # quota (see scraper/app/quota.py) — so a daily schedule is safe.
    - if: $CI_PIPELINE_SOURCE == "schedule"
    # Allow running the job manually from the web UI (like workflow_dispatch).
    - if: $CI_PIPELINE_SOURCE == "web"
  cache:
    # Reuse the uv cache whenever the lockfile is unchanged (enable-cache: true).
    - key:
        files:
          - uv.lock
      paths:
        - .uv-cache
    # Persist the scraper's state (which search prefix worked per platform)
    # between runs. Best-effort: losing it only costs extra SerpApi searches.
    - key: scraper-state
      paths:
        - .scraper-state.json
  # SERPAPI_KEY (the search-fallback key) must be added as a masked CI/CD
  # variable under Settings > CI/CD > Variables; it is injected into the job
  # environment automatically, like the GitHub `secrets.SERPAPI_KEY`.
  script:
    - uv sync --frozen --no-dev
    - uv run --frozen --no-dev scrape
    - cat site/data.json
  after_script:
    # Trim the cache to just what this run needed before GitLab uploads it.
    - uv cache prune --ci

