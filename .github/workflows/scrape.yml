name: Scrape follower counts

on:
  # schedule:
  #   # 05:00 UTC every day = 07:00 Europe/Berlin (summer) / 06:00 (winter).
  #   - cron: "0 5 * * *"
  # Allow running the job manually from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  # Required for GitHub Pages deployment (re-enable when the repo is public).
  # pages: write
  # id-token: write

# Only one Pages deployment at a time; let a running deploy finish.
# Re-enable together with the Pages steps below.
# concurrency:
#   group: pages
#   cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # environment:
    #   name: github-pages
    #   url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Scrape follower counts
        run: uv run scrape

      - name: Show scraped data
        run: cat site/data.json

      # --- GitHub Pages deployment (enable once the repo is public) ---
