name: Scrape follower counts

on:
  schedule:
    # 05:00 UTC every day = 07:00 Europe/Berlin (summer) / 06:00 (winter).
    # The script itself decides on which days to actually scrape, pacing the
    # runs so the SerpApi search fallback stays within its billing-period
    # quota (see scraper/app/quota.py) — so a daily schedule is safe.
    - cron: "0 5 * * *"
  # Allow running the job manually from the Actions tab, optionally forcing a
  # scrape that ignores the SerpApi quota pacing (see scraper/app/quota.py).
  workflow_dispatch:
    inputs:
      force:
        description: "Force a scrape, ignoring the SerpApi quota pacing"
        type: boolean
        default: false

permissions:
  contents: read
  # Required for GitHub Pages deployment
  pages: write
  id-token: write

# Only one Pages deployment at a time; let a running deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      # Persist the scraper's state (which search prefix worked per platform)
      # between runs. GitHub caches are immutable, so save under a fresh key
      # each run and restore the newest one via the prefix match.
      - name: Restore scraper state
        uses: actions/cache@v4
        with:
          path: .scraper-state.json
          key: scraper-state-${{ github.run_id }}
          restore-keys: |
            scraper-state-

      - name: Scrape follower counts
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: uv run --frozen --no-dev scrape ${{ inputs.force && '--force' || '' }}

      - name: Show scraped data
        run: cat site/data.json

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
